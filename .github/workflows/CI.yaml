name: CI
on:
  pull_request:
    branches:
      - master
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  flutter:
    name: Flutter -- verify, test
    runs-on: macOS-latest
    # Allow push so Generate locales can commit and push ARB changes to the PR branch.
    permissions:
      contents: write
    steps:
      - name: Checkout main repo
        id: checkout-main-repo
        uses: actions/checkout@v3
        with:
          path: main-repo
          fetch-depth: 0
      - name: Checkout the target 'master' branch of 'flutter-app-secrets'
        id: checkout-secrets
        uses: actions/checkout@v3
        with:
          repository: ${{ secrets.FLUTTER_APP_SECRETS_REPO }}
          ref: master
          token: ${{ secrets.ICE_CI_CD_BOT_GH_PAT }}
          path: flutter-app-secrets
          fetch-depth: 0
      - name: Set APP environment
        id: set-env
        run: |
          echo "APP_ENV=staging" >> $GITHUB_ENV
      - name: Configure APP environment (${{ env.APP_ENV }})
        id: setup-env
        run: |
          cd main-repo
          scripts/configure_env.sh $APP_ENV
      - name: Mask APP environment and keys in logs
        id: mask-secrets
        run: |
          cd main-repo
          cat .env | awk '!/^\s*#/' | awk '!/^\s*$/' | while IFS='' read -r line; do
            value=$(echo "$line" | cut -d '=' -f 2-)
            echo "::add-mask::$value"
          done
          for file in ./fastlane/keys/*.json
          do
            node -pe 'Object.entries(JSON.parse(process.argv[1])).forEach(([_, val])=>(typeof val === "string" && val.split("\n").forEach((row) => row && console.log("::add-mask::"+row))))' "$(cat $file)"
          done
      - name: Set Flutter
        id: set-flutter
        uses: subosito/flutter-action@v2
        with:
          channel: "stable"
          flutter-version-file: main-repo/pubspec.yaml
          cache: true
          cache-key: "flutter-:os:-:channel:-:version:"
          pub-cache-key: ""
      - run: flutter --version
      - name: Bootstrap
        id: bootstrap
        run: |
          cd main-repo
          ./scripts/bootstrap.sh
      - name: Install dependencies
        id: install-dependencies
        run: |
          cd main-repo
          melos exec -- "flutter pub get"
      - name: Check formatting
        id: check-formatting
        run: |
          cd main-repo
          melos run 4mat
      - name: Set l10n baseline ref (last successful run or origin/base)
        id: l10n-baseline
        if: github.event_name == 'pull_request'
        run: |
          # For PRs: use last successful CI run's commit as baseline when available; else origin/base_ref.
          BRANCH="${{ github.head_ref }}"
          RUN_ID="${{ github.run_id }}"
          BASE_DEFAULT="origin/${{ github.base_ref }}"
          if [ -z "$BRANCH" ]; then
            echo "base_ref=$BASE_DEFAULT" >> $GITHUB_OUTPUT
            exit 0
          fi
          LAST_SHA=$(curl -s -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/repos/${{ github.repository }}/actions/workflows/CI.yaml/runs?branch=${BRANCH}&status=success&per_page=10" \
            | jq -r --arg run_id "$RUN_ID" '.workflow_runs[] | select(.id != ($run_id | tonumber)) | .head_sha' | head -1)
          if [ -n "$LAST_SHA" ] && [ "$LAST_SHA" != "null" ]; then
            echo "base_ref=$LAST_SHA" >> $GITHUB_OUTPUT
          else
            echo "base_ref=$BASE_DEFAULT" >> $GITHUB_OUTPUT
          fi
      - name: Checkout PR branch (for locale commit/push)
        if: github.event_name == 'pull_request'
        run: |
          cd main-repo
          git fetch origin ${{ github.head_ref }}
          git checkout ${{ github.head_ref }}
      - name: Set git committer from PR HEAD
        if: github.event_name == 'pull_request'
        run: |
          cd main-repo
          git config --local user.name  "$(git log -1 --format='%cn')"
          git config --local user.email "$(git log -1 --format='%ce')"
      - name: Generate locales
        id: generate-locales
        env:
          BASE_REF: ${{ steps.l10n-baseline.outputs.base_ref }}
        run: |
          cd main-repo
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            bash ./scripts/auto_translate_locales.sh --commit
          else
            bash ./scripts/auto_translate_locales.sh
          fi
      - name: Re-trigger CI for new commit (so status is reported on pushed commit)
        if: github.event_name == 'pull_request'
        run: |
          cd main-repo
          HEAD_SHA=$(git rev-parse HEAD)
          if [ "$HEAD_SHA" != "${{ github.sha }}" ]; then
            echo "Locales were pushed; triggering CI for new commit so status is reported on HEAD."
            curl -s -X POST \
              -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
              -H "Accept: application/vnd.github.v3+json" \
              "https://api.github.com/repos/${{ github.repository }}/actions/workflows/CI.yaml/dispatches" \
              -d "{\"ref\":\"refs/heads/${{ github.head_ref }}\"}"
          fi
      - name: Generate code
        id: generate-code
        run: |
          cd main-repo
          # Run code generation
          ./scripts/generate_code.sh
      - name: Analyze code
        id: analyze-code
        run: |
          cd main-repo
          melos run analyze
      - name: Check license
        id: check-license
        run: |
          cd main-repo
          ./scripts/license_check.sh
      - name: Run tests
        id: run-tests
        run: |
          cd main-repo
          melos run test
